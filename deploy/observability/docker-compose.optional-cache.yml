name: shared-infra-cache

# Deliberately separate from the monitoring stack. Merely validating or
# starting Prometheus/Grafana must never require or expose a Redis password.
services:
  shared-redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: shared-redis
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        umask 077
        password="$$(cat /run/secrets/shared_redis_password)"
        case "$$password" in
          *[!A-Fa-f0-9]*|'') echo 'Redis secret must be hexadecimal' >&2; exit 1 ;;
        esac
        test "$${#password}" -ge 64 || { echo 'Redis secret must contain at least 64 hex characters' >&2; exit 1; }
        printf 'appendonly yes\nrequirepass %s\n' "$$password" > /tmp/redis.conf
        exec redis-server /tmp/redis.conf
    secrets:
      - shared_redis_password
    volumes:
      - shared-redis-data:/data
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=2m,mode=0700
    networks:
      - shared-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/shared_redis_password) redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  shared-network:
    external: true

volumes:
  shared-redis-data:
    external: true
    name: ${SHARED_REDIS_DATA_VOLUME:-shared-infra-stage_shared-redis-data}

secrets:
  shared_redis_password:
    file: ${SHARED_REDIS_PASSWORD_FILE:?Set SHARED_REDIS_PASSWORD_FILE to a private 64-hex secret file}
