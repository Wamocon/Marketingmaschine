server {
    listen 4020 ssl;
    if ($wamocon_allowed_host = 0) { return 421; }
    include /etc/nginx/conf.d/01-wamocon-client-access.conf;
    location / {
        set $upstream http://wmc-mautic-web:80;
        proxy_pass $upstream;
    }
}

server {
    listen 8188 ssl;
    if ($wamocon_allowed_host = 0) { return 421; }
    auth_basic "WAMOCON Creative";
    auth_basic_user_file /run/secrets/marketing_operator_htpasswd;
    include /etc/nginx/conf.d/01-wamocon-client-access.conf;
    location / {
        # Match the marketing-agent COMFYUI_BASE_URL. Nvidia-1 also runs an
        # unrelated LTX instance on port 8188; exposing that instance here made
        # operators and the backend observe different model inventories.
        proxy_pass http://__WAMOCON_COMFYUI_UPSTREAM__;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

server {
    listen 3030 ssl;
    if ($wamocon_allowed_host = 0) { return 421; }
