map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $request_method $marketing_write_key {
    default "";
    POST $binary_remote_addr;
    PUT $binary_remote_addr;
    PATCH $binary_remote_addr;
    DELETE $binary_remote_addr;
}

limit_req_zone $marketing_write_key zone=marketing_writes:10m rate=30r/m;

proxy_http_version 1.1;
proxy_set_header Host $http_host;
proxy_set_header X-Forwarded-Host $http_host;
# An empty value removes a caller-supplied field from the upstream request.
proxy_set_header X-Forwarded-Port "";
proxy_set_header X-Real-IP $remote_addr;
# This is a one-hop edge. Overwrite caller-supplied forwarding data so the
# attested backend never consumes a forged proxy chain.
proxy_set_header X-Forwarded-For $remote_addr;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;
client_max_body_size 200M;
proxy_connect_timeout 15s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;
send_timeout 300s;
resolver 127.0.0.11 valid=30s ipv6=off;
resolver_timeout 5s;
ssl_certificate /run/secrets/marketing_tls_certificate;
ssl_certificate_key /run/secrets/marketing_tls_private_key;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_session_cache shared:OperatorTLS:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;
server_tokens off;
add_header Strict-Transport-Security "max-age=31536000" always;

allow 127.0.0.1;
allow 10.0.0.0/8;
allow 172.16.0.0/12;
allow 192.168.0.0/16;
deny all;

server {
    listen 8117 ssl;
    # nginx does not inherit an http-level add_header once this server defines
    # any add_header of its own. Keep HSTS explicit in the console server.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data:; manifest-src 'self'; media-src 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; worker-src 'none'" always;
    # The current console uses narrowly scoped inline style attributes for
    # progress widths/accent colours, hence style-src retains unsafe-inline.
    # Scripts remain external-only and eval is not permitted.
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), publickey-credentials-get=(), usb=(), xr-spatial-tracking=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    if ($wamocon_allowed_host = 0) { return 421; }
    limit_req zone=marketing_writes burst=20 nodelay;
    auth_basic "WAMOCON Marketing";
    auth_basic_user_file /run/secrets/marketing_operator_htpasswd;
    # The approved operator network list is generated from deployment
    # configuration; DHCP addresses are never embedded in this repository.
    include /etc/nginx/conf.d/01-wamocon-client-access.conf;
    location / {
        # The console sends small JSON only; evidence and media files are
        # fingerprinted locally and uploaded directly to their owning system.
        client_max_body_size 1m;
        set $upstream http://wmc-marketing-agent:8080;
        # The API validates its private upstream authority. The original,
        # edge-validated authority is carried separately for safe URL building.
        proxy_set_header Host wmc-marketing-agent;
        # proxy_set_header directives are inherited only when the current
        # level defines none, so repeat the complete trusted one-hop set here.
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The browser never receives this secret. The restricted edge injects
        # it server-side and overwrites any caller-supplied value.
        proxy_set_header X-WAMOCON-Mutation-Token "__WAMOCON_MUTATION_TOKEN__";
        # The backend and access log receive the authenticated account name,
        # never a free-text identity supplied by browser JavaScript. The
        # independent attestation proves both headers were overwritten here.
        proxy_set_header X-WAMOCON-Actor $remote_user;
        proxy_set_header X-WAMOCON-Edge-Attestation "__WAMOCON_EDGE_ATTESTATION__";
        proxy_pass $upstream;
    }
}

server {
    listen 5678 ssl;
    if ($wamocon_allowed_host = 0) { return 421; }
    limit_req zone=marketing_writes burst=20 nodelay;
    include /etc/nginx/conf.d/01-wamocon-client-access.conf;
    location / {
        # Use nginx's Docker DNS resolver at request time. A static proxy_pass
        # caches the container address until nginx restarts and caused the
        # operator edge to return 502 after a routine n8n container restart.
        set $upstream http://core-n8n:5678;
        proxy_pass $upstream;
    }
}

