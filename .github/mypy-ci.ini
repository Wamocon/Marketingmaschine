[mypy]
python_version = 3.12
check_untyped_defs = True
follow_imports = skip
ignore_missing_imports = True
warn_unused_ignores = True

# On Linux, typeshed intentionally omits the Windows-only msvcrt.locking API.
# The implementation imports it only inside an os.name == "nt" branch, but
# mypy does not narrow os.name. Keep this exception limited to that module.
[mypy-marketing_machine.storage]
disable_error_code = attr-defined
