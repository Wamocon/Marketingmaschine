name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: src

defaults:
  run:
    shell: bash

jobs:
  python-quality:
    name: Python quality and tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"
          check-latest: false

      - name: Install hash-locked Python dependencies
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r requirements/runtime.lock
          python -m pip install --require-hashes --only-binary=:all: -r requirements/ci.lock
          python -m pip check

      - name: Compile Python sources
        run: python -m compileall -q src scripts tests

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy --config-file .github/mypy-ci.ini src scripts

      - name: Run the full Python test suite
        run: |
          mkdir -p .ci-results
          python -m pytest -q --junitxml=.ci-results/pytest.xml

      - name: Upload the failed-test summary
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-test-summary-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-results/pytest.xml
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 7

  release-contracts:
    name: Release and deployment contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12.13"
          check-latest: false

      - name: Install hash-locked Python dependencies
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r requirements/runtime.lock
          python -m pip install --require-hashes --only-binary=:all: -r requirements/ci.lock
          python -m pip check

      - name: Run release and deployment contract tests
        run: |
          mkdir -p .ci-results
          python -m pytest -q \
            tests/test_release_acceptance.py \
            tests/test_release_archive.py \
            tests/test_deployment_safety.py \
            tests/test_runtime_packaging.py \
            tests/test_n8n_workflow_security.py \
            --junitxml=.ci-results/release-contracts.xml

      - name: Evaluate the K1-K5 golden content corpus
        run: >-
          python scripts/evaluate_content_quality.py
          tests/fixtures/content_quality/golden_pass_k1_k5.json

      - name: Build and credential-scan the release archive
        run: |
          mkdir -p .ci-release
          python scripts/build_release_archive.py \
            --root . \
            --output .ci-release/wamocon-marketing-machine.tar.gz \
            --source-date-epoch 0
          cd .ci-release
          sha256sum --check wamocon-marketing-machine.tar.gz.sha256
          test -s wamocon-marketing-machine.tar.gz.inventory.json
          tar -tzf wamocon-marketing-machine.tar.gz >/dev/null

      - name: Upload the failed release-test summary
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-test-summary-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-results/release-contracts.xml
          if-no-files-found: ignore
          include-hidden-files: false
          retention-days: 7

  javascript-quality:
    name: JavaScript and npm dependencies
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"
          check-latest: false

      - name: Install locked npm dependencies without lifecycle scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Check JavaScript syntax
        run: git ls-files -z "*.js" | xargs -0 -r -n1 node --check

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  docker-build:
    name: Build the production container
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build without publishing
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build --file Dockerfile --tag wamocon-marketing-machine:ci .
